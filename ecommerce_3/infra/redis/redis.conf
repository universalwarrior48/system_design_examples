# Redis configuration for E-Commerce Phase 3
# This file contains Redis setup and configuration

# Redis will be used for:
# - Product catalog caching (TTL: 5 minutes)
# - User session storage (TTL: 15 minutes)
# - Rate limiting
# - Session management

# Basic Redis settings
REDIS_PORT=6379
REDIS_BIND=0.0.0.0
REDIS_MAXMEMORY=256mb
REDIS_MAXMEMORY_POLICY=allkeys-lru

# Persistence settings
REDIS_APPENDONLY=yes
REDIS_APPENDFSYNC=everysec
