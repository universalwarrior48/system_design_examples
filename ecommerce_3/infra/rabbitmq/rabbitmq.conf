# RabbitMQ configuration for E-Commerce Phase 3
# This file contains RabbitMQ setup and configuration

# RabbitMQ will be used for:
# - OrderCreated → Inventory Service (reserve stock)
# - OrderCreated → Payment Service (process payment)
# - PaymentProcessed → Order Service (update order status)
# - InventoryLow → Notification Service (send alerts)

# Basic RabbitMQ settings
RABBITMQ_DEFAULT_USER=guest
RABBITMQ_DEFAULT_PASS=guest
RABBITMQ_DEFAULT_VHOST=/

# Management plugin
RABBITMQ_MANAGEMENT_PORT=15672

# AMQP port
RABBITMQ_AMQP_PORT=5672

# Node name
RABBITMQ_NODENAME=rabbit@localhost

# Memory high watermark
RABBITMQ_VM_MEMORY_HIGH_WATERMARK=0.4

# Dead letter queue settings
DLX_EXCHANGE=dead_letter_exchange
DLX_QUEUE=dead_letter_queue

# Event exchanges
ORDER_EVENTS_EXCHANGE=order_events
INVENTORY_EVENTS_EXCHANGE=inventory_events
PAYMENT_EVENTS_EXCHANGE=payment_events
