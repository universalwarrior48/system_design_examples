# RabbitMQ Configuration for E-Commerce System

# Default user and password (change in production!)
default_user = guest
default_pass = guest
default_vhost = /
default_user_tags.administrator = true
default_permissions.configure = .*
default_permissions.read = .*
default_permissions.write = .*

# Cluster settings (for future scaling)
# cluster_formation.peer_discovery_backend = rabbit_peer_discovery_classic_config
# cluster_formation.classic_config.nodes.1 = rabbit@node1
# cluster_formation.classic_config.nodes.2 = rabbit@node2

# Memory management
vm_memory_high_watermark.relative = 0.6
vm_memory_high_watermark_paging_ratio = 0.75

# Disk free limit
disk_free_limit.absolute = 2GB

# Network settings
listeners.tcp.default = 5672
management.tcp.port = 15672

# Message persistence
queue_master_locator = min-masters

# Logging
log.level = info

# Heartbeat
heartbeat = 60

# Channel maximum
channel_max = 2047

# Connection maximum
connections_max = 65535

# Frame maximum
frame_max = 131072

# Handshake timeout
handshake_timeout = 60000

# Shutdown timeout
shutdown_timeout = 10000

# Queue settings
queue_index_embed_msgs_below = 4096

# Raft log settings (for quorum queues)
raft.data_dir = /var/lib/rabbitmq/mnesia

# Prometheus metrics endpoint
prometheus.enable_default_exporter = true
prometheus.metrics_port = 9419
